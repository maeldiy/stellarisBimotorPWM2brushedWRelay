; PlatformIO Configuration for Stellaris LM4F120 (TM4C123G) LaunchPad
; Board: Stellaris LM4F120 LaunchPad
; Platform: TI Tiva (TITIVA)

[env:lm4f120_launchpad]
platform = titiva
board = lplm4f120h5qr
framework = arduino

; Serial Communication Settings
monitor_port = COM9
monitor_speed = 115200
monitor_echo = yes

; Upload Settings (JTAG/SWD via OpenOCD - not serial bootloader)
upload_protocol = openocd
upload_speed = 115200
upload_port = COM9
upload_options = 
    -c 'transport select swd'
    -c 'adapter_khz 400'
    -c 'adapter_nsrst_delay 200'
    -c 'telnet_port disabled'

; Build Settings
build_flags = 
    -include src/energia_compat.h
    -std=c++11
    -Os
    -Wall
    -Wno-error=all
    -D_GNU_SOURCE
    -D_BSD_SOURCE
    -D_DEFAULT_SOURCE
    -Wno-deprecated-declarations

; Library Dependencies (none required - using hardware interrupts)
lib_deps =
; ===== ALTERNATIVE CONFIGURATION FOR DEBUGGING =====
; Use this environment if upload fails:
; pio run -e lm4f120_debug -t upload
[env:lm4f120_debug]
platform = titiva
board = lplm4f120h5qr
framework = arduino
monitor_port = COM9
monitor_speed = 115200
upload_protocol = openocd
upload_port = COM9
upload_options = 
    -c 'debug_level 2'
    -c 'adapter_khz 100'
    -c 'telnet_port disabled'
build_flags = 
    -include src/energia_compat.h
    -std=c++11
    -Os
    -Wall
    -Wno-error=all
    -D_GNU_SOURCE
    -D_BSD_SOURCE
    -D_DEFAULT_SOURCE
    -Wno-deprecated-declarations
    -DDEBUG

[platformio]
description = Stellaris LM4F120 Bi-Motor PWM Controller with ArduPilot Integration
