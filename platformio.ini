; PlatformIO Configuration for Stellaris LM4F120 (TM4C123G) LaunchPad
; Board: Stellaris LM4F120 LaunchPad
; Platform: TI Tiva (TITIVA)

[env:lm4f120_launchpad]
platform = titiva
board = lplm4f120h5qr
framework = arduino

; Serial Communication Settings
monitor_port = COM9
monitor_speed = 115200
monitor_echo = yes

; Upload Settings
upload_protocol = serial
upload_speed = 115200
upload_port = COM9

; Build Settings
build_flags = 
    -include src/energia_compat.h
    -std=c++11
    -Os
    -Wall
    -Wno-error=all
    -D_GNU_SOURCE
    -D_BSD_SOURCE
    -D_DEFAULT_SOURCE
    -Wno-deprecated-declarations

; Library Dependencies (none required - using hardware interrupts)
lib_deps =

[platformio]
description = Stellaris LM4F120 Bi-Motor PWM Controller with ArduPilot Integration
