; PlatformIO Configuration for Stellaris LM4F120 (TM4C123G) LaunchPad
; Board: Stellaris LM4F120 LaunchPad
; Platform: TI Tiva (TITIVA)

[env:lm4f120_launchpad]
platform = titiva
board = lm4f120_launchpad
framework = arduino

; Serial Communication Settings
monitor_port = COM9
monitor_speed = 115200
monitor_echo = yes
monitor_filters = send_on_enter

; Upload Settings
upload_protocol = serial
upload_speed = 115200
upload_port = COM9

; Build Settings
build_flags = 
    -std=c++11
    -Os
    -Wall
    -Wextra

; Compiler settings
compiler.c.extra_flags = -Wno-strict-aliasing

; Library Dependencies
lib_deps = 
    
; Source filtering
src_filter = 
    +<src/>

; Extra scripts (optional)
; extra_scripts = post:extra_script.py

[platformio]
description = Stellaris LM4F120 Bi-Motor PWM Controller with ArduPilot Integration

